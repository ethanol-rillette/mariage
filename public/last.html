<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dernière capture</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style2.css">

</head>

<body>

<div id="lastCapture"></div>

<script>
let lastId;

async function load(){
  const res = await fetch('/last');
  const data = await res.json();

  if(!data) return;
  if(data._id === lastId) return;

  lastId = data._id;

  if(data.type === 'photo'){
    lastCapture.innerHTML = `<img src="${data.content}">`;
  } else {
    lastCapture.innerHTML = `<video src="${data.content}" autoplay loop muted></video>`;
  }
}

load();
setInterval(load,3000);
</script>

</body>
</html>
