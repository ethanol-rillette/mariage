<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photothèque</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Photothèque<br>Nathan & Faustine</h1>

<div class="preview-box">
  <video id="video" autoplay muted></video>
</div>

<div class="controls">

  <button onclick="takePhoto()">Photo 📸</button>

  <div class="video-controls">
    <button onclick="startRecording()">ON 🎥</button>
    <button onclick="stopRecording()">OFF ⏹️</button>
    <div id="recordingIndicator"></div>
  </div>

</div>

<input type="file" id="fileInput" hidden>
<button id="importBtn">Importer</button>

<div id="previewContainer">
  <div id="preview"></div>
</div>

<button id="downloadBtn">Télécharger</button>
<button id="uploadBtn">Envoyer à la base</button>

<br>

<a href="last.html" target="_blank">Voir la dernière capture</a>

<canvas id="canvas" style="display:none;"></canvas>
<input type="hidden" id="uploader" value="Nathan">

<script>
let stream, mediaRecorder, chunks = [];
let lastData = null;
let lastType = null;

// CAMERA
navigator.mediaDevices.getUserMedia({ video:true, audio:true })
.then(s => {
  stream = s;
  video.srcObject = s;
});

// INIT BUTTONS (IMPORTANT)
document.addEventListener('DOMContentLoaded', () => {
  hideButtons();
});

// SHOW / HIDE BUTTONS
function showButtons(){
  downloadBtn.style.display = 'inline-block';
  uploadBtn.style.display = 'inline-block';
}

function hideButtons(){
  downloadBtn.style.display = 'none';
  uploadBtn.style.display = 'none';
}

// PREVIEW
function showPreview(){
  const p = document.getElementById('preview');

  if(lastType === 'photo'){
    p.innerHTML = `<img src="${lastData}">`;
  } else {
    p.innerHTML = `<video src="${lastData}" autoplay loop muted controls></video>`;
  }

  previewContainer.style.display = 'block';
  showButtons();
}

// PHOTO
function takePhoto(){
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  lastData = canvas.toDataURL('image/png');
  lastType = 'photo';

  showPreview();
}

// VIDEO
function startRecording(){
  chunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.start();
}

function stopRecording(){
  mediaRecorder.stop();

  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, {type:'video/webm'});
    const reader = new FileReader();

    reader.onload = () => {
      lastData = reader.result;
      lastType = 'video';
      showPreview();
    };

    reader.readAsDataURL(blob);
  };
}

// IMPORT
importBtn.onclick = () => fileInput.click();

fileInput.onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    lastData = reader.result;
    lastType = file.type.startsWith('image') ? 'photo' : 'video';
    showPreview();
  };

  reader.readAsDataURL(file);
};

// DOWNLOAD
downloadBtn.onclick = () => {
  const a = document.createElement('a');
  a.href = lastData;
  a.download = lastType === 'photo' ? 'photo.png' : 'video.webm';
  a.click();
};

// UPLOAD
uploadBtn.onclick = async () => {
  await fetch('/upload', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      content:lastData,
      type:lastType,
      uploader:document.getElementById('uploader').value
    })
  });

  alert("Envoyé !");
  hideButtons();
  previewContainer.style.display = 'none';
  preview.innerHTML = '';
};
</script>

</body>
</html>
