<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Photothèque</title>
<link rel="stylesheet" href="style.css">

<style>
#importBtn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
  font-size: 16px;
}
#importBtn:hover {
  background: #333;
}

.controls {
  display:flex;
  justify-content:space-between;
  width:300px;
  margin:auto;
}
</style>

</head>

<body>

<h1>Photothèque <br>Nathan & Faustine</h1>

<video id="video" autoplay></video>
<br>

<div class="controls">
  <div class="left">
    <button onclick="takePhoto()">Photo 📸</button>
  </div>

  <div class="right">
    <div style="display:flex; align-items:center; gap:10px;">
      <button onclick="startRecording()">ON 🎥</button>
      <div id="recordingIndicator"
           style="display:none;width:15px;height:15px;background:red;border-radius:50%;">
      </div>
    </div>
    <button onclick="stopRecording()">OFF ⏹️</button>
  </div>
</div>

<!-- IMPORT CUSTOM -->
<input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
<button id="importBtn">Importer</button>

<br><br>

<div id="previewContainer" style="display:none;">
  <div id="preview"></div>
</div>

<button id="downloadBtn" style="display:none;">Télécharger</button>
<button id="uploadBtn" style="display:none;">Envoyer à la base</button>

<br><br>

<a href="last.html" target="_blank">Voir la dernière capture</a>

<canvas id="canvas" style="display:none;"></canvas>
<input type="hidden" id="uploader" value="Nathan">

<script>
let stream, mediaRecorder, recordedChunks=[], recordingTimeout;
let lastCaptureData=null, lastCaptureType=null;

const MAX_SIZE_MB=10;
const MAX_VIDEO_DURATION=10;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(s => {
  stream=s;
  document.getElementById('video').srcObject=s;
})
.catch(err => alert('Erreur caméra : '+err));

// PREVIEW
function showPreview(){
  const container=document.getElementById('previewContainer');
  const preview=document.getElementById('preview');

  if(lastCaptureType==='photo'){
    preview.innerHTML=`<img src="${lastCaptureData}" width="300">`;
  } else {
    preview.innerHTML=`<video src="${lastCaptureData}" width="300" controls autoplay loop muted></video>`;
  }

  container.style.display='block';
  document.getElementById('downloadBtn').style.display='inline-block';
  document.getElementById('uploadBtn').style.display='inline-block';
}

// PHOTO
function takePhoto(){
  const canvas=document.getElementById('canvas');
  const video=document.getElementById('video');

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  canvas.getContext('2d').drawImage(video,0,0);

  lastCaptureData=canvas.toDataURL('image/png');
  lastCaptureType='photo';

  showPreview();
}

// VIDEO
function startRecording(){
  recordedChunks=[];
  mediaRecorder=new MediaRecorder(stream);

  mediaRecorder.ondataavailable=e=>{
    if(e.data.size>0) recordedChunks.push(e.data);
  };

  mediaRecorder.start();

  document.getElementById('recordingIndicator').style.display='block';

  recordingTimeout=setTimeout(()=>{
    if(mediaRecorder.state==="recording"){
      stopRecording();
      alert("Vidéo arrêtée automatiquement");
    }
  }, MAX_VIDEO_DURATION*1000);
}

function stopRecording(){
  clearTimeout(recordingTimeout);

  mediaRecorder.stop();

  mediaRecorder.onstop=()=>{
    const blob=new Blob(recordedChunks,{type:'video/webm'});

    if(blob.size>MAX_SIZE_MB*1024*1024){
      alert("Vidéo trop lourde !");
      document.getElementById('recordingIndicator').style.display='none';
      return;
    }

    const reader=new FileReader();

    reader.onloadend=()=>{
      lastCaptureData=reader.result;
      lastCaptureType='video';
      showPreview();
    };

    reader.readAsDataURL(blob);

    document.getElementById('recordingIndicator').style.display='none';
  };
}

// IMPORT BUTTON
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('importBtn').onclick=()=>{
    document.getElementById('fileInput').click();
  };
});

// FILE IMPORT
document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file) return;

  if(file.size>MAX_SIZE_MB*1024*1024){
    alert("Fichier trop lourd !");
    return;
  }

  const reader=new FileReader();

  reader.onloadend=function(){
    lastCaptureData=reader.result;
    lastCaptureType=file.type.startsWith('image')?'photo':'video';
    showPreview();
  };

  reader.readAsDataURL(file);
});

// DOWNLOAD
document.getElementById('downloadBtn').onclick=()=>{
  const link=document.createElement('a');
  link.href=lastCaptureData;
  link.download=lastCaptureType==='photo'
    ? `photo_${Date.now()}.png`
    : `video_${Date.now()}.webm`;

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// UPLOAD
document.getElementById('uploadBtn').onclick=async()=>{
  const uploader=document.getElementById('uploader').value;

  if(!lastCaptureData){
    alert("Aucune capture !");
    return;
  }

  try{
    const res=await fetch('/upload',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        content:lastCaptureData,
        uploader,
        type:lastCaptureType
      })
    });

    if(res.ok){
      alert("Envoyé à la base !");

      document.getElementById('downloadBtn').style.display='none';
      document.getElementById('uploadBtn').style.display='none';
      document.getElementById('previewContainer').style.display='none';
      document.getElementById('preview').innerHTML='';
    } else {
      alert("Erreur upload !");
    }

  } catch(err){
    console.error(err);
    alert("Erreur serveur !");
  }
};
</script>

</body>
</html>
