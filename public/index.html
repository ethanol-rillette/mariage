<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photothèque</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Photothèque<br>Nathan & Faustine</h1>

<!-- CAMERA -->
<div class="preview-box">
  <video id="video" autoplay playsinline muted></video>
</div>

<!-- CONTROLS GRID -->
<div class="controls">
  <div class="controls-grid">

    <button class="btn switch" onclick="switchCamera()">🔄 Switch</button>
    <button class="btn photo" onclick="takePhoto()">📸 Photo</button>

    <button class="btn on" onclick="startRecording()">ON 🎥</button>
    <button class="btn off" onclick="stopRecording()">OFF ⏹️</button>

    <div id="recordingIndicator"></div>

  </div>
</div>

<!-- IMPORT -->
<input type="file" id="fileInput" accept="image/*,video/*" hidden>
<button id="importBtn" onclick="fileInput.click()">Importer</button>

<!-- PREVIEW -->
<div id="previewContainer" style="display:none;">
  <div id="preview"></div>
</div>

<!-- ACTION BUTTONS -->
<button id="downloadBtn">Télécharger</button>
<button id="uploadBtn">Envoyer à la base</button>

<br>

<a href="last.html" target="_blank">Voir la dernière capture</a>

<!-- HIDDEN -->
<canvas id="canvas" style="display:none;"></canvas>
<input type="hidden" id="uploader" value="Nathan">

</body>
</html>
