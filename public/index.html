<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photothèque</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Photothèque<br>Nathan & Faustine</h1>

<!-- CAMERA -->
<div class="preview-box">
  <video id="video" autoplay playsinline muted></video>
</div>

<!-- CONTROLS GRID -->
<div class="controls">
  <div class="controls-grid">

    <button class="btn switch" onclick="switchCamera()">🔄 Switch</button>
    <button class="btn photo" onclick="takePhoto()">📸 Photo</button>

    <button class="btn on" onclick="startRecording()">ON 🎥</button>
    <button class="btn off" onclick="stopRecording()">OFF ⏹️</button>

    <div id="recordingIndicator"></div>

  </div>
</div>

<!-- IMPORT -->
<input type="file" id="fileInput" accept="image/*,video/*" hidden>
<button id="importBtn" onclick="fileInput.click()">Importer</button>

<!-- PREVIEW -->
<div id="previewContainer" style="display:none;">
  <div id="preview"></div>
</div>

<!-- ACTION BUTTONS -->
<button id="downloadBtn">Télécharger</button>
<button id="uploadBtn">Envoyer à la base</button>

<br>

<a href="last.html" target="_blank">Voir la dernière capture</a>

<!-- HIDDEN -->
<canvas id="canvas" style="display:none;"></canvas>
<input type="hidden" id="uploader" value="Nathan">

<script>

let stream;
let mediaRecorder;
let chunks = [];
let lastData = null;
let lastType = null;

let currentFacingMode = "user";

const video = document.getElementById("video");

// =======================
// INIT CAMERA
// =======================
async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: currentFacingMode,
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: true
  });

  video.srcObject = stream;

  applyMirror();

  video.onloadedmetadata = () => {
    const maxW = Math.min(window.innerWidth * 0.7, 400);
    const ratio = video.videoHeight / video.videoWidth;

    const box = document.querySelector(".preview-box");

    box.style.width = maxW + "px";
    box.style.height = maxW * ratio + "px";
  };
}

// =======================
// MIRROR LOGIC
// =======================
function applyMirror() {
  if (currentFacingMode === "user") {
    video.style.transform = "scaleX(-1)";
  } else {
    video.style.transform = "scaleX(1)";
  }
}

// =======================
// SWITCH CAMERA
// =======================
async function switchCamera() {
  currentFacingMode =
    currentFacingMode === "user" ? "environment" : "user";

  await startCamera();
}

// =======================
// PHOTO
// =======================
function takePhoto() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // miroir si front camera (Snapchat style)
  if (currentFacingMode === "user") {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }

  ctx.drawImage(video, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  lastData = canvas.toDataURL("image/png");
  lastType = "photo";

  showPreview();
}

// =======================
// VIDEO RECORD
// =======================
function startRecording() {
  chunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  mediaRecorder.start();

  document.getElementById("recordingIndicator").style.display = "block";
}

function stopRecording() {
  mediaRecorder.stop();

  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const reader = new FileReader();

    reader.onload = () => {
      lastData = reader.result;
      lastType = "video";
      showPreview();
    };

    reader.readAsDataURL(blob);

    document.getElementById("recordingIndicator").style.display = "none";
  };
}

// =======================
// PREVIEW
// =======================
function showPreview() {
  const preview = document.getElementById("preview");
  const container = document.getElementById("previewContainer");

  if (lastType === "photo") {
    preview.innerHTML = `<img src="${lastData}">`;
  } else {
    preview.innerHTML = `<video src="${lastData}" autoplay loop muted playsinline></video>`;
  }

  container.style.display = "block";

  showButtons();
}

// =======================
// BUTTONS
// =======================
function showButtons() {
  document.getElementById("downloadBtn").style.display = "block";
  document.getElementById("uploadBtn").style.display = "block";
}

function hideButtons() {
  document.getElementById("downloadBtn").style.display = "none";
  document.getElementById("uploadBtn").style.display = "none";
}

// =======================
// DOWNLOAD
// =======================
document.getElementById("downloadBtn").onclick = () => {
  if (!lastData) return;

  const a = document.createElement("a");
  a.href = lastData;

  a.download = lastType === "photo"
    ? `photo_${Date.now()}.png`
    : `video_${Date.now()}.webm`;

  a.click();
};

// =======================
// UPLOAD
// =======================
document.getElementById("uploadBtn").onclick = async () => {
  if (!lastData) return alert("Aucune capture");

  try {
    const res = await fetch("/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content: lastData,
        type: lastType,
        uploader: document.getElementById("uploader").value
      })
    });

    if (res.ok) {
      alert("Envoyé !");
      document.getElementById("previewContainer").style.display = "none";
      hideButtons();
    } else {
      alert("Erreur upload");
    }

  } catch (err) {
    alert("Erreur serveur");
  }
};

// =======================
// INIT
// =======================
startCamera().catch(err => {
  alert("Erreur caméra : " + err.message);
});

document.getElementById("downloadBtn").style.display = "none";
document.getElementById("uploadBtn").style.display = "none";
</script>

</body>
</html>
